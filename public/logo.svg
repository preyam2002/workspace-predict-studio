  </defs>
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="114.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3"/>
